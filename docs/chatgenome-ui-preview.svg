<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="780" viewBox="0 0 1600 780" role="img" aria-label="ChatGenome workspace preview">
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#d7f0ff"/>
      <stop offset="100%" stop-color="#e8f6ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#7ab9e8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="780" fill="url(#bg)"/>

  <text x="26" y="58" font-size="24">🧬</text>
  <text x="70" y="60" font-family="Georgia, Times New Roman, serif" font-size="44" font-weight="700" fill="#14263d">ChatGenome</text>
  <text x="1192" y="60" font-family="Arial, sans-serif" font-size="14" fill="#25384a">Copyright 2026. BISPL@KAIST AI, All rights reserved.</text>

  <g filter="url(#shadow)">
    <rect x="14" y="88" rx="26" ry="26" width="400" height="650" fill="#ffffff" fill-opacity="0.92"/>
    <rect x="440" y="88" rx="26" ry="26" width="730" height="650" fill="#ffffff" fill-opacity="0.92"/>
    <rect x="1190" y="88" rx="26" ry="26" width="396" height="650" fill="#ffffff" fill-opacity="0.92"/>
  </g>

  <g font-family="Arial, sans-serif" fill="#1d2c3b">
    <text x="40" y="125" font-size="18" font-weight="700">Sources</text>
    <text x="470" y="125" font-size="18" font-weight="700">Chat</text>
    <text x="1218" y="125" font-size="18" font-weight="700">Studio</text>
  </g>

  <rect x="42" y="174" rx="24" ry="24" width="346" height="52" fill="#ffffff" stroke="#dfe7ef"/>
  <text x="171" y="207" font-family="Arial, sans-serif" font-size="17" fill="#2a3948">+ Add VCF source</text>

  <text x="42" y="255" font-family="Arial, sans-serif" font-size="15" fill="#607080">API base URL</text>
  <rect x="42" y="274" rx="16" ry="16" width="346" height="54" fill="#ffffff" stroke="#d2dcea"/>
  <text x="58" y="309" font-family="Courier New, monospace" font-size="16" fill="#1e2b36">http://127.0.0.1:8001</text>

  <rect x="42" y="348" rx="20" ry="20" width="346" height="84" fill="#ffffff" stroke="#dfe7ef"/>
  <text x="58" y="380" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#1d2c3b">roh.1.vcf.gz</text>
  <text x="58" y="406" font-family="Arial, sans-serif" font-size="14" fill="#657689">Active VCF source</text>
  <circle cx="352" cy="379" r="14" fill="#edf1f5"/>
  <text x="346" y="384" font-family="Arial, sans-serif" font-size="13" fill="#2a3948">1</text>

  <text x="42" y="472" font-family="Arial, sans-serif" font-size="15" fill="#607080">Status</text>
  <text x="178" y="472" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#1d2c3b">Grounded summary ready</text>
  <text x="42" y="504" font-family="Arial, sans-serif" font-size="14" fill="#657689">The initial grounded summary is ready. You can</text>
  <text x="42" y="528" font-family="Arial, sans-serif" font-size="14" fill="#657689">continue asking questions about any Studio result.</text>

  <rect x="975" y="106" rx="18" ry="18" width="152" height="36" fill="#eef2f4"/>
  <text x="993" y="129" font-family="Courier New, monospace" font-size="15" fill="#244566">Analysis ready</text>

  <text x="472" y="245" font-family="Arial, sans-serif" font-size="18" fill="#1f2e3a">This VCF contains 3124 records across 1 contig(s) and appears to align to GRCh37</text>
  <text x="472" y="274" font-family="Arial, sans-serif" font-size="18" fill="#1f2e3a">(inferred from chr1 length). The summary below reflects both the backend draft summary</text>
  <text x="472" y="303" font-family="Arial, sans-serif" font-size="18" fill="#1f2e3a">and the current Studio-derived review state.</text>

  <text x="472" y="380" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#182534">Backend grounded summary</text>
  <text x="472" y="438" font-family="Arial, sans-serif" font-size="18" fill="#1f2e3a">This VCF contains 3124 records across 1 contig(s) and appears to align to GRCh37...</text>
  <text x="472" y="468" font-family="Arial, sans-serif" font-size="18" fill="#1f2e3a">The file should be explained with grounded VCF semantics, not direct model inference...</text>

  <text x="472" y="594" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#182534">QC and file status</text>
  <text x="482" y="646" font-family="Arial, sans-serif" font-size="18" fill="#1f2e3a">• PASS rate: 100.0%</text>

  <rect x="468" y="682" rx="22" ry="22" width="566" height="60" fill="#ffffff" stroke="#297cf2" stroke-width="2"/>
  <text x="492" y="720" font-family="Arial, sans-serif" font-size="15" fill="#8a94a4">Start typing a follow-up question...</text>
  <circle cx="1114" cy="712" r="30" fill="#f97331"/>
  <text x="1107" y="719" font-family="Arial, sans-serif" font-size="22" fill="#ffffff">→</text>

  <g font-family="Arial, sans-serif">
    <g>
      <rect x="1218" y="174" rx="22" ry="22" width="164" height="108" fill="#dfe7ff" stroke="#d3dcf0"/>
      <text x="1238" y="205" font-size="17" font-weight="700" fill="#1d2c3b">Workflow Setup</text>
      <text x="1238" y="244" font-size="14" fill="#5f7183">Tools, scope, and</text>
      <text x="1238" y="264" font-size="14" fill="#5f7183">run policy</text>
    </g>
    <g>
      <rect x="1396" y="174" rx="22" ry="22" width="164" height="108" fill="#f1e7ff" stroke="#e1d7ee"/>
      <text x="1416" y="205" font-size="17" font-weight="700" fill="#1d2c3b">QC Summary</text>
      <text x="1416" y="244" font-size="14" fill="#5f7183">PASS, Ti/Tv, GT</text>
      <text x="1416" y="264" font-size="14" fill="#5f7183">quality</text>
    </g>
    <g>
      <rect x="1218" y="298" rx="22" ry="22" width="164" height="108" fill="#e2f2ee" stroke="#d3e7e1"/>
      <text x="1238" y="329" font-size="17" font-weight="700" fill="#1d2c3b">Clinical</text>
      <text x="1238" y="352" font-size="17" font-weight="700" fill="#1d2c3b">Coverage</text>
      <text x="1238" y="390" font-size="14" fill="#5f7183">Annotation</text>
    </g>
    <g>
      <rect x="1396" y="298" rx="22" ry="22" width="164" height="108" fill="#e3e7ff" stroke="#d5dbf0"/>
      <text x="1416" y="329" font-size="17" font-weight="700" fill="#1d2c3b">Filtering View</text>
      <text x="1416" y="390" font-size="14" fill="#5f7183">Searchable triage</text>
    </g>
    <g>
      <rect x="1218" y="422" rx="22" ry="22" width="164" height="108" fill="#f7eed6" stroke="#eadfbe"/>
      <text x="1238" y="453" font-size="17" font-weight="700" fill="#1d2c3b">Symbolic ALT</text>
      <text x="1238" y="476" font-size="17" font-weight="700" fill="#1d2c3b">Review</text>
      <text x="1238" y="514" font-size="14" fill="#5f7183">Records split out</text>
    </g>
    <g>
      <rect x="1396" y="422" rx="22" ry="22" width="164" height="108" fill="#dff6e6" stroke="#cfe7d7"/>
      <text x="1416" y="453" font-size="17" font-weight="700" fill="#1d2c3b">ROH /</text>
      <text x="1416" y="476" font-size="17" font-weight="700" fill="#1d2c3b">Recessive</text>
      <text x="1416" y="514" font-size="14" fill="#5f7183">Hom-alt and ROH</text>
    </g>
    <g>
      <rect x="1218" y="546" rx="22" ry="22" width="164" height="108" fill="#f0e3f5" stroke="#e0d4e6"/>
      <text x="1238" y="577" font-size="17" font-weight="700" fill="#1d2c3b">Candidate</text>
      <text x="1238" y="600" font-size="17" font-weight="700" fill="#1d2c3b">Variants</text>
      <text x="1238" y="638" font-size="14" fill="#5f7183">Ranked shortlist</text>
    </g>
    <g>
      <rect x="1396" y="546" rx="22" ry="22" width="164" height="108" fill="#f8efd9" stroke="#eadfc8"/>
      <text x="1416" y="577" font-size="17" font-weight="700" fill="#1d2c3b">VEP</text>
      <text x="1416" y="600" font-size="17" font-weight="700" fill="#1d2c3b">Consequence</text>
      <text x="1416" y="638" font-size="14" fill="#5f7183">Consequence view</text>
    </g>
